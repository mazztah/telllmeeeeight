# fly.toml app configuration file generated for telllmeeeeight on 2026-07-12T07:35:12Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'telllmeeeeight'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1

# HINWEIS (Persistenz-Problem bleibt bestehen, siehe Chat-Verlauf):
# Ohne [[mounts]] liegt DATA_DIR (SQLite-Brain-DB) im ephemeren
# Container-Dateisystem und geht bei Redeploys/Neustarts verloren.
# Der [[mounts]]-Block wurde hier absichtlich wieder entfernt, damit
# der Deploy ohne vorher angelegtes Fly-Volume durchlaeuft. Sobald du
# bereit bist, ein Volume anzulegen (Dashboard: fly.io/apps/telllmeeeeight
# -> Volumes -> Create Volume, Name "brain_data", Region wie deine
# Machine, z.B. "fra"), kannst du folgenden Block wieder einfuegen:
#
# [[mounts]]
#   source = "brain_data"
#   destination = "/home/user/app/data"
