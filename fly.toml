# fly.toml app configuration file generated for telllmeeeeight on 2026-07-12T07:35:12Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'telllmeeeeight'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1

# NEU: Persistenter Volume-Mount fuer DATA_DIR (siehe Dockerfile:
# ENV DATA_DIR="/home/user/app/data"). Vorher gab es HIER GAR KEIN
# [[mounts]] - die SQLite-Brain-DB (brain.py, primaerer Speicherort,
# Supabase ist nur Hintergrund-Best-Effort-Spiegel) lag im ephemeren
# Container-Dateisystem und ging bei jedem "fly deploy" (neue Machine-
# Instanz aus neuem Image) verloren, teils auch bei Restarts.
#
# EINMALIG vor dem naechsten Deploy ausfuehren (Volume-Name/Groesse
# nach Bedarf anpassen, "ams" = primary_region oben):
#   fly volumes create brain_data --region ams --size 1
#
# Falls mehrere Machines/Regionen laufen: pro Region ein eigenes Volume
# anlegen, sonst kann die Machine nicht in der Region starten.
[[mounts]]
  source = "brain_data"
  destination = "/home/user/app/data"
